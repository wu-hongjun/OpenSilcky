site_name: OpenSlicky
site_description: Open-source driver & tools for the Lexcelon Slicky USB status light
site_url: https://openslicky.dev
repo_url: https://github.com/openslicky/openslicky
repo_name: openslicky/openslicky

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Reference:
      - CLI: reference/cli.md
      - Daemon API: reference/daemon-api.md
      - FFI: reference/ffi.md
      - Protocol: reference/protocol.md
  - Development:
      - Contributing: development/contributing.md
      - Architecture: development/architecture.md
