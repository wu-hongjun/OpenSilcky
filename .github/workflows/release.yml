name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS ARM64
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: brew install hidapi create-dmg

      - name: Build
        run: cargo build --workspace --release

      - name: Package DMG
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGING="OpenSlicky-${TAG}"
          mkdir -p "${STAGING}"

          # Binaries
          cp target/release/slicky  "${STAGING}/"
          cp target/release/slickyd "${STAGING}/"

          # FFI artifacts
          cp target/release/libslicky_ffi.a     "${STAGING}/" 2>/dev/null || true
          cp target/release/libslicky_ffi.dylib  "${STAGING}/" 2>/dev/null || true
          cp crates/slicky-ffi/include/slicky.h  "${STAGING}/" 2>/dev/null || true

          # Create DMG
          create-dmg \
            --volname "OpenSlicky ${TAG}" \
            --window-size 500 300 \
            --icon-size 80 \
            --no-internet-enable \
            "OpenSlicky-${TAG}-aarch64-apple-darwin.dmg" \
            "${STAGING}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: OpenSlicky-*.dmg
