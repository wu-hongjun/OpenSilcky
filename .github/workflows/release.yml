name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS ARM64
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: brew install hidapi create-dmg

      - name: Build
        run: cargo build --workspace --release

      - name: Build .app bundle and DMG
        run: bash scripts/build-app.sh "${GITHUB_REF_NAME}"

      - name: Package FFI artifacts
        run: |
          TAG="${GITHUB_REF_NAME}"
          FFI_DIR="StatusLight-FFI-${TAG}"
          mkdir -p "${FFI_DIR}"

          cp target/release/libstatuslight_ffi.a     "${FFI_DIR}/" 2>/dev/null || true
          cp target/release/libstatuslight_ffi.dylib  "${FFI_DIR}/" 2>/dev/null || true
          cp crates/statuslight-ffi/include/statuslight.h  "${FFI_DIR}/" 2>/dev/null || true

          zip -r "StatusLight-FFI-${TAG}.zip" "${FFI_DIR}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            StatusLight-*.dmg
            StatusLight-FFI-*.zip
